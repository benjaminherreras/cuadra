name: Keep Render alive
on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cuadra-api.onrender.com/health)
          echo "Health: $STATUS"
          [ "$STATUS" = "200" ] && echo "Alive" || echo "Down"
